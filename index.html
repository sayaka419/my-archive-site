<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINKI Official Music List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SHINKI MUSIC LIST</h1>
    </header>

    <div id="song-list" class="song-list"></div>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <button id="prev-btn" class="nav-btn">＜</button>
            <button id="next-btn" class="nav-btn">＞</button>

            <span class="close-btn">&times;</span>

            <div class="modal-body">
                <div class="video-container">
                    <iframe id="modal-video" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="lyrics-container">
                    <pre id="modal-title"></pre>
                    <pre id="modal-lyrics"></pre>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
